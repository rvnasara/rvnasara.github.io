<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name= "viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gallery</title>
    <!-- CSS SECTION -->
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link rel="stylesheet" href="content/app.css">
</head>
<body>
<!-- HEADER NAV BAR SECTION -->
<header></header>
<div class="gallery"> <!-- Lightbox images will show in this div-->
    <h1>Lightbox</h1>

</div>

<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">X</span>
    <img class="lightbox-content" id="lightbox-image">
    <a class="prev" onclick="changeImage(-1)">Back</a>
    <a class="next" onclick="changeImage(1)">Next</a>

</div>



    <!-- Footer navbar-->
<footer id="footer"></footer>
<!-- Javascript section-->
<script src="./node_modules/jquery/dist/jquery.min.js"></script>
<script src="./node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
<script src="./scripts/app.js"></script>


</body>
</html>
